# ==============================================================================
# Required Keys
# These keys are mandatory. A missing or invalid key will fail the build process.
# ==============================================================================
PLACES_API_KEY=YOUR_API_KEY
MAPS_API_KEY=YOUR_API_KEY

# ==============================================================================
# Optional Keys
# These keys are not strictly required to build the repository, but certain 
# demos will fail at runtime if the key is not provided.
# ==============================================================================

# MAP_ID: If missing, the 'PlaceDetailsCompose' demo will fail to load custom map styling at runtime.
MAP_ID=YOUR_MAP_ID

# MAPS3D_API_KEY: If missing, the 'PlacesUIKit3D' demo will fail to load 3D maps at runtime.
MAPS3D_API_KEY=YOUR_API_KEY
